<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyimpanan XX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleUp {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }
        .animate-scale-up {
            animation: scaleUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased">

    <div id="app">
        <router-view></router-view>
    </div>

    <script>
        const { ref, onMounted } = Vue;

        // --- GLOBAL AXIOS INTERCEPTORS ---
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        }, error => {
            return Promise.reject(error);
        });

        axios.interceptors.response.use(response => response, error => {
            if (error.response && error.response.status === 401) {
                alert('Sesi Anda telah habis atau tidak valid! Silakan login kembali.');
                localStorage.clear();
                window.location.hash = '#/login';
            }
            return Promise.reject(error);
        });

        // --- 1. KOMPONEN VIEW: LOGIN ---
        const LoginComponent = {
            template: `
            <div class="relative min-h-screen flex items-center justify-center bg-gradient-to-tr from-[#022c22] via-[#064e3b] to-[#0f766e] px-4 overflow-hidden">
                <!-- Ambient Light Effects -->
                <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#10b981]/15 rounded-full blur-[120px] pointer-events-none"></div>
                <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#0d9488]/15 rounded-full blur-[120px] pointer-events-none"></div>
                
                <div class="relative max-w-md w-full bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] border border-white/20 text-white z-10 transition-all duration-300 hover:border-white/30">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 border border-white/20 shadow-inner mb-4 animate-bounce duration-[3000ms]">
                            <span class="text-3xl">📦</span>
                        </div>
                        <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2">Penyimpanan XX</h2>
                        <p class="text-sm text-emerald-200/80">Sistem Manajemen Stok Terintegrasi</p>
                    </div>
                    <form @submit.prevent="handleLogin" class="space-y-5">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-emerald-200/90 mb-1.5">Username Admin</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-emerald-300/60">👤</span>
                                <input v-model="username" type="text" required placeholder="Masukkan username" 
                                    class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all duration-200 bg-opacity-20 backdrop-blur-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-emerald-200/90 mb-1.5">Password</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-emerald-300/60">🔒</span>
                                <input :type="showPassword ? 'text' : 'password'" v-model="password" required placeholder="Masukkan password" 
                                    class="w-full pl-10 pr-10 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all duration-200 bg-opacity-20 backdrop-blur-sm">
                                <button type="button" @click="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-emerald-300/60 hover:text-white transition-colors">
                                    <span v-if="showPassword">🔒</span>
                                    <span v-else>👁️</span>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="w-full mt-2 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3 rounded-xl transition duration-300 shadow-[0_4px_15px_rgba(16,185,129,0.3)] hover:shadow-[0_6px_20px_rgba(16,185,129,0.5)] transform hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98]">
                            Masuk ke Dashboard
                        </button>
                    </form>
                    <div class="mt-6 text-center text-sm">
                        <p class="text-emerald-200/70">Belum punya akun admin? 
                            <router-link to="/register" class="text-emerald-300 font-semibold hover:text-emerald-200 hover:underline transition-colors">Daftar Akun Baru</router-link>
                        </p>
                    </div>
                </div>
            </div>
            `,
            setup() {
                const username = ref('');
                const password = ref('');
                const showPassword = ref(false);
                const router = VueRouter.useRouter();

                const handleLogin = () => {
                    axios.post('http://localhost:8080/api/login', {
                        username: username.value,
                        password: password.value
                    })
                    .then(response => {
                        console.log('Login response', response);
                        const resData = response.data;
                        const token = resData.token || (resData.data && resData.data.token);
                        const isSuccess = response.status === 200 || resData.status === 200;
                        console.log('resData', resData, 'token', token, 'isSuccess', isSuccess);

                        if (isSuccess && token) {
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('token', token);
                            
                            alert('Login Berhasil! Mengalihkan ke Dashboard...');
                            console.log('Attempting safeNavigate to /dashboard/barang');
                            window.safeNavigate('/dashboard/barang');
                        } else {
                            alert('Gagal Login! Periksa kembali Username dan Password.');
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        const msg = error.response && error.response.data.messages ? error.response.data.messages.error : 'Periksa kembali Username dan Password.';
                        alert('Gagal Login: ' + msg);
                    });
                };
                return { username, password, showPassword, handleLogin };
            }
        };

        // --- 2. KOMPONEN VIEW: REGISTRASI (AKUN BARU) ---
        const RegisterComponent = {
            template: `
            <div class="relative min-h-screen flex items-center justify-center bg-gradient-to-tr from-[#022c22] via-[#064e3b] to-[#0f766e] px-4 overflow-hidden">
                <!-- Ambient Light Effects -->
                <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#10b981]/15 rounded-full blur-[120px] pointer-events-none"></div>
                <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#0d9488]/15 rounded-full blur-[120px] pointer-events-none"></div>
                
                <div class="relative max-w-md w-full bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] border border-white/20 text-white z-10 transition-all duration-300 hover:border-white/30">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 border border-white/20 shadow-inner mb-4 animate-bounce duration-[3000ms]">
                            <span class="text-3xl">📝</span>
                        </div>
                        <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2">Buat Akun Admin</h2>
                        <p class="text-sm text-emerald-200/80">Daftarkan akses operator baru sistem inventaris</p>
                    </div>
                    <form @submit.prevent="handleRegister" class="space-y-5">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-emerald-200/90 mb-1.5">Username Baru</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-emerald-300/60">👤</span>
                                <input v-model="username" type="text" required placeholder="Masukkan username baru"
                                    class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all duration-200 bg-opacity-20 backdrop-blur-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-emerald-200/90 mb-1.5">Password</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-emerald-300/60">🔒</span>
                                <input :type="showPassword ? 'text' : 'password'" v-model="password" required placeholder="Masukkan password"
                                    class="w-full pl-10 pr-10 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all duration-200 bg-opacity-20 backdrop-blur-sm">
                                <button type="button" @click="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-emerald-300/60 hover:text-white transition-colors">
                                    <span v-if="showPassword">🔒</span>
                                    <span v-else>👁️</span>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="w-full mt-2 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-3 rounded-xl transition duration-300 shadow-[0_4px_15px_rgba(16,185,129,0.3)] hover:shadow-[0_6px_20px_rgba(16,185,129,0.5)] transform hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98]">
                            Daftar Sekarang
                        </button>
                    </form>
                    <div class="mt-6 text-center text-sm">
                        <p class="text-emerald-200/70">Sudah punya akun? 
                            <router-link to="/login" class="text-emerald-300 font-semibold hover:text-emerald-200 hover:underline transition-colors">Login Kembali</router-link>
                        </p>
                    </div>
                </div>
            </div>
            `,
            setup() {
                const username = ref('');
                const password = ref('');
                const showPassword = ref(false);
                const router = VueRouter.useRouter();

                const handleRegister = () => {
                    axios.post('http://localhost:8080/api/register', {
                        username: username.value,
                        password: password.value
                    })
                    .then(() => {
                        return axios.post('http://localhost:8080/api/login', {
                            username: username.value,
                            password: password.value
                        });
                    })
                    .then(loginResponse => {
                        const token = loginResponse.data.token || (loginResponse.data.data && loginResponse.data.data.token);
                        if (token) {
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('token', token);
                            alert('Registrasi dan login berhasil! Mengalihkan ke Dashboard...');
                            window.safeNavigate('/dashboard/barang');
                        } else {
                            alert('Registrasi berhasil, namun login otomatis gagal. Silakan login manual.');
                            router.push('/login');
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        const msg = error.response && error.response.data && error.response.data.messages ? error.response.data.messages.error : 'Gagal melakukan registrasi, periksa endpoint backend Anda.';
                        alert('Gagal Registrasi: ' + msg);
                    });
                };

                return { username, password, showPassword, handleRegister };
            }
        };

        // --- 3. KOMPONEN VIEW: DASHBOARD PANEL ---
        const DashboardComponent = {
            template: `
            <div class="min-h-screen bg-slate-950 text-slate-100 font-sans relative overflow-hidden pb-12">
                <!-- Background glowing accents -->
                <div class="absolute top-0 right-1/4 w-[500px] h-[500px] bg-emerald-500/5 rounded-full blur-[150px] pointer-events-none"></div>
                <div class="absolute bottom-10 left-10 w-[500px] h-[500px] bg-teal-500/5 rounded-full blur-[150px] pointer-events-none"></div>

                <div class="container mx-auto p-6 max-w-7xl relative z-10">
                    <header class="relative flex justify-between items-center mb-8 bg-slate-900/60 backdrop-blur-md p-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-slate-800/80 animate-fade-in-up">
                        <div>
                            <h1 class="text-2xl font-extrabold tracking-tight text-white flex items-center gap-2">
                                <span class="text-3xl filter drop-shadow-[0_0_8px_rgba(16,185,129,0.3)]">📦</span> Penyimpanan XX
                            </h1>
                            <p class="text-sm text-slate-400 mt-1">Sistem Manajemen Stok Barang Terintegrasi API</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="bg-emerald-950/60 text-emerald-300 text-xs font-semibold px-3.5 py-1.5 rounded-full border border-emerald-800/60 shadow-inner">
                                Frontend SPA Vue.js
                            </span>
                            <button @click="handleLogout" class="bg-red-950/40 hover:bg-red-900/60 text-red-400 text-xs font-bold px-4 py-2.5 rounded-xl border border-red-900/80 transition-all duration-200 transform hover:scale-[1.03] active:scale-[0.97]">
                                Logout 🚪
                            </button>
                        </div>
                    </header>
                    <router-view></router-view>
                </div>
            </div>
            `,
            setup() {
                const router = VueRouter.useRouter();
                const handleLogout = () => {
                    localStorage.clear();
                    alert('Sesi diakhiri.');
                    router.push('/login');
                };
                return { handleLogout };
            }
        };

        // --- 4. KOMPONEN VIEW: TABEL DATA BARANG + MODAL FORM ---
        const BarangComponent = {
            template: `
            <main class="bg-slate-900/40 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-800/80 overflow-hidden animate-fade-in-up" style="animation-delay: 150ms;">
                <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/20">
                    <h2 class="font-extrabold text-lg text-emerald-100 flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span>
                        Daftar Stok Inventaris
                    </h2>
                    <div class="flex gap-3">
                        <button @click="bukaModalTambah" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white text-sm font-bold px-4 py-2.5 rounded-xl transition duration-300 shadow-[0_4px_15px_rgba(16,185,129,0.2)] hover:shadow-[0_6px_20px_rgba(16,185,129,0.4)] transform hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] flex items-center gap-1.5">
                            ➕ Tambah Barang
                        </button>
                        <button @click="ambilData" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-bold px-4 py-2.5 rounded-xl transition duration-300 border border-slate-700/80 transform hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] flex items-center gap-2">
                            🔄 Refresh Data
                        </button>
                    </div>
                </div>

                <div v-if="loading" class="p-16 text-center text-slate-400">
                    <div class="inline-block w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                    <p class="text-sm font-medium animate-pulse">Memuat data dari API Server...</p>
                </div>

                <div v-else class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900/60 border-b border-slate-800 text-xs font-bold text-emerald-400 uppercase tracking-wider">
                                <th class="px-6 py-4">Kode Barang</th>
                                <th class="px-6 py-4">Nama Barang</th>
                                <th class="px-6 py-4">Kategori</th>
                                <th class="px-6 py-4">Supplier</th>
                                <th class="px-6 py-4 text-right">Harga</th>
                                <th class="px-6 py-4 text-center">Stok</th>
                                <th class="px-6 py-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/60 text-sm text-slate-300">
                            <tr v-for="(item, index) in barang" :key="item.id" 
                                :style="{ animationDelay: (index * 60) + 'ms' }" 
                                class="animate-fade-in-up opacity-0 hover:bg-emerald-950/20 transition-all duration-200">
                                <td class="px-6 py-4 font-mono text-xs font-bold text-emerald-400">{{ item.kode_barang }}</td>
                                <td class="px-6 py-4 font-semibold text-white">{{ item.nama_barang }}</td>
                                <td class="px-6 py-4">
                                    <span class="bg-slate-800/80 text-emerald-300 text-xs px-2.5 py-1 rounded-md border border-slate-700/50">
                                        {{ item.nama_kategori || 'Elektronik & Gadget' }}
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-slate-400">{{ item.nama_supplier || 'Supplier Utama' }}</td>
                                <td class="px-6 py-4 text-right font-semibold text-white">
                                    Rp {{ Number(item.harga).toLocaleString('id-ID') }}
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <span :class="item.stok > 20 ? 'bg-emerald-950/60 text-emerald-400 border-emerald-800/80' : 'bg-amber-950/60 text-amber-400 border-amber-800/80'" 
                                          class="text-xs font-semibold px-2.5 py-1 rounded-full border shadow-sm">
                                        {{ item.stok }} pcs
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <div class="flex justify-center items-center gap-3">
                                        <button @click="bukaModalEdit(item)" class="text-emerald-400 hover:text-emerald-300 text-xs font-bold transition-colors">Edit ✏️</button>
                                        <span class="text-slate-700">|</span>
                                        <button @click="hapusBarang(item.id)" class="text-red-400 hover:text-red-300 text-xs font-bold transition-colors">Hapus 🗑️</button>
                                    </div>
                                </td>
                            </tr>
                            <tr v-if="barang.length === 0">
                                <td colspan="7" class="px-6 py-12 text-center text-slate-500">Tidak ada data barang yang tersedia.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div v-if="modalTerbuka" class="fixed inset-0 bg-slate-950/70 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl animate-scale-up">
                        <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                            <span>{{ isEdit ? '📝 Edit Data Barang' : '➕ Tambah Barang Baru' }}</span>
                        </h3>
                        <form @submit.prevent="simpanBarang" class="space-y-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Kode Barang</label>
                                <input v-model="form.kode_barang" type="text" required placeholder="Contoh: BRG-001" 
                                    class="mt-1 w-full px-3.5 py-2.5 bg-slate-950/80 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-transparent transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Nama Barang</label>
                                <input v-model="form.nama_barang" type="text" required placeholder="Contoh: Laptop Asus" 
                                    class="mt-1 w-full px-3.5 py-2.5 bg-slate-950/80 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-transparent transition-all">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Harga (Rupiah)</label>
                                    <input v-model="form.harga" type="number" required placeholder="0" 
                                        class="mt-1 w-full px-3.5 py-2.5 bg-slate-950/80 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-transparent transition-all">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Stok Awal</label>
                                    <input v-model="form.stok" type="number" required placeholder="0" 
                                        class="mt-1 w-full px-3.5 py-2.5 bg-slate-950/80 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-transparent transition-all">
                                </div>
                            </div>
                            <div class="flex justify-end gap-3 pt-3 border-t border-slate-800 mt-5">
                                <button type="button" @click="modalTerbuka = false" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2.5 rounded-xl text-sm font-semibold transition">Batal</button>
                                <button type="submit" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition shadow-[0_4px_15px_rgba(16,185,129,0.2)]">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
            `,
            setup() {
                const barang = ref([]);
                const loading = ref(true);
                const modalTerbuka = ref(false);
                const isEdit = ref(false);
                const currentId = ref(null);

                const form = ref({
                    kode_barang: '',
                    nama_barang: '',
                    harga: 0,
                    stok: 0,
                    kategori_id: 1,
                    supplier_id: 1
                });

                const ambilData = () => {
                    loading.value = true;
                    axios.get('http://localhost:8080/api/barang')
                        .then(response => {
                            barang.value = Array.isArray(response.data) ? response.data : (response.data.data || []);
                            loading.value = false;
                        })
                        .catch(error => {
                            console.error("Gagal mengambil data:", error);
                            loading.value = false;
                        });
                };

                const bukaModalTambah = () => {
                    isEdit.value = false;
                    currentId.value = null;
                    form.value = { kode_barang: '', nama_barang: '', harga: 0, stok: 0, kategori_id: 1, supplier_id: 1 };
                    modalTerbuka.value = true;
                };

                const bukaModalEdit = (item) => {
                    isEdit.value = true;
                    currentId.value = item.id;
                    form.value = { ...item };
                    modalTerbuka.value = true;
                };

                const simpanBarang = () => {
                    if (isEdit.value) {
                        axios.put(`http://localhost:8080/api/barang/${currentId.value}`, form.value)
                            .then(() => {
                                modalTerbuka.value = false;
                                ambilData();
                            }).catch(err => alert("Gagal mengupdate barang!"));
                    } else {
                        axios.post('http://localhost:8080/api/barang', form.value)
                            .then(() => {
                                modalTerbuka.value = false;
                                ambilData();
                            }).catch(err => alert("Gagal menyimpan barang baru!"));
                    }
                };

                const hapusBarang = (id) => {
                    if (confirm("Apakah Anda yakin ingin menghapus data inventaris ini?")) {
                        axios.delete(`http://localhost:8080/api/barang/${id}`)
                            .then(() => {
                                ambilData();
                            }).catch(err => alert("Gagal menghapus data barang!"));
                    }
                };

                onMounted(() => { ambilData(); });
                return { 
                    barang, loading, ambilData, modalTerbuka, isEdit, 
                    form, bukaModalTambah, bukaModalEdit, simpanBarang, hapusBarang 
                };
            }
        };

        // --- 5. CONFIG VUE ROUTER ENGINES ---
        const routes = [
            { path: '/', redirect: '/login' },
            { path: '/login', component: LoginComponent },
            { path: '/register', component: RegisterComponent }, // Rute Baru ke Registrasi
            { 
                path: '/dashboard', 
                component: DashboardComponent,
                meta: { requiresAuth: true },
                children: [
                    { path: 'barang', component: BarangComponent }
                ]
            }
        ];

        const router = VueRouter.createRouter({
            history: VueRouter.createWebHashHistory(),
            routes
        });

        // Helper navigation yang lebih andal: coba `router.push`, lalu fallback ke hash
        window.safeNavigate = function(path) {
            try {
                router.push(path);
                console.log('safeNavigate: router.push', path);
            } catch (e) {
                console.warn('safeNavigate: router.push failed', e);
            }
            try {
                // pastikan format hash dimulai dengan '#/'
                const hashPath = (path.startsWith('#') ? path : '#' + (path.startsWith('/') ? path : '/' + path));
                window.location.hash = hashPath;
                console.log('safeNavigate: set location.hash to', hashPath);
            } catch (e) {
                console.warn('safeNavigate: setting hash failed', e);
            }
        };

        router.beforeEach((to, from, next) => {
            const isAuthenticated = localStorage.getItem('isLoggedIn') === 'true';
            if (to.meta.requiresAuth && !isAuthenticated) {
                alert('Akses Ilegal Ditolak! Sila Login Dahulu.');
                // gunakan safeNavigate agar konsisten
                window.safeNavigate('/login');
                next('/login');
            } else {
                next();
            }
        });

        const app = Vue.createApp({});
        app.use(router);
        app.mount('#app');
    </script>
</body>
</html>
